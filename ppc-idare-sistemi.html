
<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PPC Rəqəmsal İdarəetmə Sistemi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1B3A6B;--navy2:#1E4D8C;--navy-dark:#122848;
  --teal:#0A7C6E;--teal2:#0D9E8D;
  --amber:#E8931A;--amber2:#F5A623;
  --red:#D94F3D;--red2:#E8604E;
  --green:#2E8B57;--green2:#35A366;
  --purple:#6B4FB8;
  --blue:#1E5FAD;--blue2:#2B74D4;
  --bg:#F0F4FA;--surface:#FFFFFF;--surface2:#F4F7FC;--surface3:#EEF2F8;
  --border:#DDE4EF;--border2:#C8D5E8;
  --text:#1A2540;--text2:#4A5E7A;--text3:#8096B4;
  --r:8px;--r2:12px;--r3:16px
}
html{font-size:14px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:236px;background:var(--navy-dark);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.logo-area{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.logo-top{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border-radius:10px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.logo-name{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px}
.logo-sub{font-size:10px;color:rgba(255,255,255,.35);margin-top:10px;letter-spacing:.04em;text-transform:uppercase}
.nav{flex:1;padding:10px 10px;overflow-y:auto}
.nav-group{margin-bottom:20px}
